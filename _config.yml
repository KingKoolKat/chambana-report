# Site
name: 'The Chambana Report'
description: 'The Chambana Report is a newspaper that covers stories from Urbana to Champaign.'
logo: 'assets/images/logo.png'
favicon: 'assets/images/favicon.ico'
baseurl: ''
url: "https://www.chambanareport.org"
disqus: ''
email: 'jfhogg2@gmail.com'

include: ["_pages"]
permalink: /:title/

# Plugins
plugins: 
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-seo-tag
  
